x-app-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-cinnamon}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-cinnamon}
  REDIS_URL: redis://redis:6379

x-app-image: &app-image
  image: ghcr.io/ianuriegas/cinnamon:${CINNAMON_VERSION:-latest}

x-app-volumes: &app-volumes
  - ./cinnamon.config.ts:/app/cinnamon.config.ts:ro
  - ./jobs:/app/jobs
  - ./db/migrations:/app/db/custom-migrations:ro

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinnamon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-cinnamon}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinnamon} -d ${POSTGRES_DB:-cinnamon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    <<: *app-image
    env_file: .env
    environment:
      <<: *app-env
    volumes:
      - ./db/migrations:/app/db/custom-migrations:ro
    command: ["bun", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    <<: *app-image
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    volumes: *app-volumes
    command: ["bun", "run", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    <<: *app-image
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    volumes: *app-volumes
    command: ["bun", "run", "scheduler"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api:
    <<: *app-image
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
      NODE_ENV: production
    volumes: *app-volumes
    ports:
      - "3000:3000"
    command: ["bun", "run", "server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
