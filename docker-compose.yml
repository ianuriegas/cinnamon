x-app-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-cinnamon}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-cinnamon}
  REDIS_URL: redis://redis:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinnamon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinnamon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-cinnamon}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinnamon} -d ${POSTGRES_DB:-cinnamon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinnamon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    container_name: cinnamon-migrate
    env_file: .env
    environment:
      <<: *app-env
    command: ["bun", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    container_name: cinnamon-worker
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["bun", "run", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: .
    container_name: cinnamon-scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["bun", "run", "scheduler"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api:
    build: .
    container_name: cinnamon-api
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: ["bun", "run", "server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
